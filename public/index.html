<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdAngle AI</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css">
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  
  <script src="https://cdn.shopify.com/shopifycloud/app-bridge.js"></script>
</head>
<body>
  <div id="app">
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;">
      <p>Loading...</p>
    </div>
  </div>

  <script>
    // Initialize Shopify App Bridge and get session token
    const urlParams = new URLSearchParams(window.location.search);
    const host = urlParams.get('host');
    const shop = urlParams.get('shop');
    
    window.SHOP = shop;
    window.HOST = host;
    
    if (host && window.shopify) {
      // We're inside Shopify Admin with App Bridge
      window.shopify.idToken().then(token => {
        window.SESSION_TOKEN = token;
        console.log('Got session token');
        loadApp();
      }).catch(err => {
        console.log('No session token, using direct mode');
        loadApp();
      });
    } else {
      loadApp();
    }
    
    function loadApp() {
      const script = document.createElement('script');
      script.src = '/js/app.js';
      document.body.appendChild(script);
    }
  </script>
</body>
</html>
