# ==========================================
# AdAngle AI - Docker Compose
# For local development and self-hosted deployment
# ==========================================

version: '3.8'

services:
  # ========================================
  # Main Application
  # ========================================
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://adangle:adangle@postgres:5432/adangle
      - REDIS_URL=redis://redis:6379
      - SHOPIFY_API_KEY=${SHOPIFY_API_KEY}
      - SHOPIFY_API_SECRET=${SHOPIFY_API_SECRET}
      - SHOPIFY_SCOPES=${SHOPIFY_SCOPES:-read_products,read_content}
      - SHOPIFY_HOST=${SHOPIFY_HOST}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - SESSION_SECRET=${SESSION_SECRET}
      - DISABLE_WORKERS=true  # Workers run separately for scale
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # ========================================
  # Worker (AI Job Processing)
  # ========================================
  worker:
    build: .
    command: ["node", "server.js"]
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://adangle:adangle@postgres:5432/adangle
      - REDIS_URL=redis://redis:6379
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - WORKER_CONCURRENCY=10
      - DISABLE_WORKERS=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G
          cpus: '1'

  # ========================================
  # PostgreSQL Database
  # ========================================
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=adangle
      - POSTGRES_PASSWORD=adangle
      - POSTGRES_DB=adangle
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adangle"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # ========================================
  # Redis
  # ========================================
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 300M

  # ========================================
  # Nginx Load Balancer (optional, for production)
  # ========================================
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - app
    restart: unless-stopped
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:

# ==========================================
# Usage:
# 
# Development:
#   docker-compose up -d postgres redis
#   npm run dev
#
# Production (self-hosted):
#   docker-compose up -d
#
# Scale workers:
#   docker-compose up -d --scale worker=5
#
# With nginx (production profile):
#   docker-compose --profile production up -d
# ==========================================
